# Voxel Ledger — local development stack.
#
# Usage:
#   cp .env.dev.example .env.dev
#   scripts/compose.sh up -d --build
#
# Bring everything down with:
#   scripts/compose.sh down
#
# Source mounts give us hot reload in both directions:
#   - backend:  uvicorn --reload watches /app
#   - frontend: vite watches /app/frontend
#
# Healthchecks gate startup order so `docker compose up` waits for db before
# starting backend, and frontend after backend.

name: voxel-ledger-dev

services:
  db:
    image: postgres:16-alpine
    container_name: voxel-ledger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voxel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voxel}
      POSTGRES_DB: ${POSTGRES_DB:-voxel_ledger}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxel} -d ${POSTGRES_DB:-voxel_ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      target: dev
    container_name: voxel-ledger-backend
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      # Compose's network DNS resolves "db" — override the host portion only
      # so a developer-supplied DATABASE_URL still wins if it is set.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://voxel:voxel@db:5432/voxel_ledger}
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: node:20-alpine
    container_name: voxel-ledger-frontend
    restart: unless-stopped
    working_dir: /repo/frontend
    environment:
      # Vite's HMR needs to bind on 0.0.0.0 inside the container.
      HOST: "0.0.0.0"
      # Point the SPA at the backend service exposed by compose. Adjust this
      # in .env.dev if you proxy differently.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./:/repo
      - frontend_node_modules:/repo/node_modules
      - frontend_frontend_node_modules:/repo/frontend/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    # corepack pins the pnpm version declared in package.json; --host exposes
    # vite on the container interface so the host port mapping works.
    command:
      - sh
      - -c
      - |
        corepack enable && \
        pnpm install --frozen-lockfile && \
        pnpm --filter @voxel-ledger/frontend dev --host 0.0.0.0 --port 5173
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  db_data:
  frontend_node_modules:
  frontend_frontend_node_modules:
