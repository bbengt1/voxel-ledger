name: CI

# Run on every PR and on pushes to main. Concurrency group cancels older
# runs on the same ref so a fast-follow-up commit doesn't wait behind a
# superseded run.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret / PII guard
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Scan tracked tree for secrets / prod-identifiable info
        run: scripts/check_secrets.sh --all

  backend:
    name: Backend (lint, type-check, test)
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 60

    # Ephemeral Postgres for integration tests that opt in via the
    # `integration` pytest marker. Unit tests use in-memory SQLite by
    # default — see backend/tests/conftest.py.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voxel
          POSTGRES_PASSWORD: voxel
          POSTGRES_DB: voxel_ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U voxel -d voxel_ledger_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      # Unit-test default; pytest fixtures override per-test as needed.
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      # Connection string for any test that opts into Postgres.
      POSTGRES_TEST_URL: "postgresql+asyncpg://voxel:voxel@localhost:5432/voxel_ledger_test"
      JWT_SECRET_KEY: "ci-secret-key-not-a-real-secret-xxxxxxxxxxxx"
      ENVIRONMENT: "test"
      TESTING: "true"
      BCRYPT_ROUNDS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python (self-hosted; system python3.12 in venv)
        shell: bash
        run: |
          python3.12 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --upgrade pip

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend/[dev]"
          # Tooling needed for lint/format checks lives in the workspace
          # root config; install pinned-enough versions explicitly.
          pip install ruff==0.7.4

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: pytest
        # Parallelize with pytest-xdist. `--dist loadscope` groups tests by
        # module so each worker owns whole modules — keeps module-scoped
        # fixtures and the per-test testcontainers Postgres well-behaved.
        # The serial suite was bumping the 60-min job timeout; this keeps it
        # comfortably under.
        run: pytest backend/tests -q -n auto --dist loadscope

  frontend:
    name: Frontend (lint, type-check, test, build)
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "20.11"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm --filter @voxel-ledger/frontend lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm --filter @voxel-ledger/frontend exec tsc --noEmit

      - name: Vitest
        run: pnpm --filter @voxel-ledger/frontend test

      - name: Build
        run: pnpm --filter @voxel-ledger/frontend build

  codegen-drift:
    name: Codegen drift (openapi.json + types.ts)
    runs-on: [self-hosted, linux, docker]
    needs: backend
    timeout-minutes: 25

    # The backend export script reads these for settings validation.
    env:
      ENVIRONMENT: "test"
      TESTING: "true"
      JWT_SECRET_KEY: "ci-secret-key-not-a-real-secret-xxxxxxxxxxxx"
      DATABASE_URL: "postgresql+asyncpg://u:p@localhost:5432/voxel_ledger_codegen"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python (self-hosted; system python3.12 in venv)
        shell: bash
        run: |
          python3.12 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --upgrade pip

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "20.11"
          cache: pnpm

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Codegen drift check
        # codegen:check re-exports the OpenAPI spec, regenerates types.ts,
        # and runs `git diff --exit-code` on both. Non-zero exit means a
        # contributor changed the backend without re-running codegen.
        run: pnpm run codegen:check

  pitr-drill:
    name: PITR drill (pg_dump round-trip + parity)
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 25
    needs: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voxel
          POSTGRES_PASSWORD: voxel
          POSTGRES_DB: voxel_ledger_drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U voxel -d voxel_ledger_drill"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "postgresql+asyncpg://voxel:voxel@localhost:5432/voxel_ledger_drill"
      JWT_SECRET_KEY: "drill-secret-key-not-a-real-secret-xx"
      ENVIRONMENT: "test"
      OWNER_EMAIL: "owner@example.com"
      OWNER_PASSWORD: "voxel-owner-password"
      BCRYPT_ROUNDS: "4"
      PGPASSWORD: "voxel"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python (self-hosted; system python3.12 in venv)
        shell: bash
        run: |
          python3.12 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --upgrade pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend/[dev]"

      - name: Migrate + seed owner
        run: |
          (cd backend && alembic upgrade head)
          python -m scripts.seed_owner

      - name: Run drill against fresh DB
        run: |
          DRILL_SRC_URL="postgres://voxel:voxel@localhost:5432/voxel_ledger_drill" \
            DRILL_DST_PORT=5599 \
            ops/backups/drill.sh smoke

  pitr-drill-full:
    name: PITR drill (WAL-archive + base + replay, end-to-end)
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 25
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Run full WAL-replay drill
        run: |
          DRILL_DST_PORT=5601 ops/backups/drill.sh full

  loadtests-smoke:
    name: Load tests (smoke, perf-budget enforcement)
    runs-on: [self-hosted, linux, docker]
    timeout-minutes: 30
    needs: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voxel
          POSTGRES_PASSWORD: voxel
          POSTGRES_DB: voxel_ledger_loadtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U voxel -d voxel_ledger_loadtest"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "postgresql+asyncpg://voxel:voxel@localhost:5432/voxel_ledger_loadtest"
      JWT_SECRET_KEY: "loadtest-secret-key-not-a-real-secret-xx"
      ENVIRONMENT: "test"
      OWNER_EMAIL: "owner@example.com"
      OWNER_PASSWORD: "voxel-owner-password"
      BCRYPT_ROUNDS: "4"
      BASE_URL: "http://localhost:8000"
      VUS: "10"
      DURATION: "30s"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python (self-hosted; system python3.12 in venv)
        shell: bash
        run: |
          python3.12 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --upgrade pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend/[dev]"

      - name: Migrate + seed owner
        run: |
          (cd backend && alembic upgrade head)
          python -m scripts.seed_owner

      - name: Boot backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; cat backend.log; exit 1

      - name: Install k6
        run: |
          # Install into a runner-writable path; no sudo needed (self-hosted
          # runner does not have passwordless sudo).
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz \
            | tar -xz --strip-components=1 -C "$RUNNER_TEMP/bin" k6-v0.54.0-linux-amd64/k6
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run k6 budgets
        run: |
          set -e
          for f in loadtests/simple_get.js loadtests/list_endpoints.js \
                   loadtests/cost_calc.js loadtests/pos_lookup.js; do
            echo "=== $f ==="
            k6 run "$f"
          done
