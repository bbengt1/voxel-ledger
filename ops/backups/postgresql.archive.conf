# WAL archive configuration (Phase 12.2, #204).
#
# Include this snippet from ``postgresql.conf`` (or mount it via the
# Docker entrypoint with ``-c config_file=/etc/postgresql/postgresql.conf``)
# to enable continuous WAL archiving on top of the nightly
# pg_basebackup. Pairs with restore_command in ``recovery.conf`` (or
# ``postgresql.auto.conf`` on PG12+) when doing PITR.
#
# WAL_ARCHIVE_DIR is local-fs by default; production deploys point
# this at an offsite-mounted directory (NFS / rclone fuse).

wal_level = replica
archive_mode = on
# Use %p (full path) and %f (filename) so the archive_command is
# transparent. The ! check + cp -n keeps re-runs idempotent (no
# clobber); the script bypasses if WAL already shipped.
archive_command = 'test ! -f /var/backups/wal/%f && cp %p /var/backups/wal/%f'
archive_timeout = 60        # cap "stale tail" to 60s of activity
max_wal_senders = 3
wal_keep_size = 256MB
