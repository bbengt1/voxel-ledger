# Fallback nginx config baked into the frontend image.
#
# The prod stack overrides this by mounting ops/nginx/default.conf into the
# dedicated nginx container, which is what actually reverse-proxies /api/ to
# the backend. This file exists so the frontend image alone serves the SPA
# usefully if you run it standalone (e.g. for debugging).

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/wasm image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
