# Voxel Ledger production reverse proxy.
#
# Mounted into the `nginx` service in docker-compose.prod.yml.
#
# Layout:
#   - Static SPA assets are served from /usr/share/nginx/html (baked into the
#     `frontend` image at build time and copied across via the named volume
#     `frontend_dist`).
#   - /api/  → backend container on port 8000.
#   - /health → backend /health (handy for the host-level uptime check).
#   - TLS is a placeholder. In real production this terminates upstream of
#     this container (Caddy/Traefik/external LB) or the listener below is
#     swapped for `listen 443 ssl` with mounted certs from
#     /srv/3d-print-sales/env/certs.

upstream voxel_backend {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # ---- TLS placeholder ----------------------------------------------------
    # When real certs are mounted (Phase 12), uncomment the block below and
    # add a 301 from :80 to :443.
    #
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # Reasonable defaults.
    client_max_body_size 25m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/wasm image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        proxy_pass http://voxel_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://voxel_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # SPA fallback — let React Router own the URL space.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
