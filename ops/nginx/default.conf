# Voxel Ledger production reverse proxy.
#
# Mounted into the `nginx` service in docker-compose.prod.yml.
#
# Layout:
#   - / and SPA routes  → frontend container (which bundles nginx + SPA dist).
#   - /api/             → backend container on port 8000.
#   - /health           → backend /health (handy for uptime checks).
#   - TLS is terminated upstream (Cloudflare Tunnel on web02). When running
#     standalone, swap the listener below to `listen 443 ssl` with mounted
#     certs.

upstream voxel_backend {
    server backend:8000;
}

upstream voxel_frontend {
    server frontend:80;
}

server {
    listen 80 default_server;
    server_name _;

    # ---- TLS placeholder ----------------------------------------------------
    # When real certs are mounted (Phase 12), uncomment the block below and
    # add a 301 from :80 to :443.
    #
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # Reasonable defaults.
    client_max_body_size 25m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/wasm image/svg+xml;

    location = /health {
        proxy_pass http://voxel_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://voxel_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # SPA + static assets — proxy to the frontend container, which bundles
    # its own nginx + the built dist and handles the React Router fallback.
    location / {
        proxy_pass http://voxel_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
